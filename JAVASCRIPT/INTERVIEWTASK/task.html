<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <center>
    <h2 class="text-4xl p-10 bg-gray-200"> [1, 2, 3, 4, 5]</h2>

   <div class="gap-10 mt-20">
     <button class="bg-blue-400 p-10 rounded-xl" onclick="add()">ADDITION</button>
    <button class="bg-blue-400 p-10 rounded-xl" onclick="sub()">SUBTRACT</button>
    <button class="bg-blue-400 p-10 rounded-xl" onclick="mul()">MUTIPLY</button>
    <button class="bg-blue-400 p-10 rounded-xl" onclick="div()">DIVIDE</button>
   </div>

    <h3 class="text-2xl p-10 bg-gray-300 mt-20" id="result"></h3>

    <script>
        const arr = [1, 2, 3, 4, 5];

        function add() {
            let add = 0;
            for (let i = 0; i < arr.length; i++) {
                add += arr[i];
            }
            document.getElementById("result").innerHTML = "Addition: " + add;
          }




        function sub() {
            let result = arr[0];
            for (let i = 1; i < arr.length; i++) {
                result -= arr[i];
            }
            document.getElementById("result").innerHTML = "Subtraction: " + result;
        }

        function mul() {
            let result = 1;
            for (let i = 0; i < arr.length; i++) {
                result *= arr[i];
          }
            document.getElementById("result").innerHTML = "Multiplication: " + result;
           }

        function div() {
            let result = arr[0];
            for (let i = 1; i < arr.length; i++) {
                result /= arr[i];
            }
            document.getElementById("result").innerHTML = "Division: " + result;
          }
    </script>
    </center>
</body>
</html>
