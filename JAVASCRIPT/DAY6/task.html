<script>




  //     Task 1
  let heroes = ["Vijay", "Ajith", "Suriya", "Sk"];

  for (let a = 0; a <= heroes.length - 1; a++) {

  }





  //   Task 2

  let collections = [200, 500, 800, 400, 600];

  let heighest = collections[0];

  for (let c = 1; c < collections.length; c++) {
    if (collections[c] > heighest) {
      heighest = collections[c];
    }
  }
  console.log("heighest value", heighest);

  //   Task 3

  let lowestCollection = [200, 500, 800, 400, 600];

  let lowest = lowestCollection[0];

  for (let i = 1; i < lowestCollection.length; i++) {
    if (lowestCollection[i] < lowest) {
      lowest = lowestCollection[i];
    }
  }

  console.log("Lowest value", lowest);

  //   Task 4

  let collection = [200, 500, 800, 400, 600];

  let total = 0;

  for (let i = 0; i < collection.length; i++) {
    total += collection[i];
  }

  console.log("Total", total);

 

  // Task 6

  let names = ["Vijay", "Ajith", "Suriya", "SK"];

  let reverse = [];

  let index = 0;

  for (let i = names.length - 1; i >= 0; i--) {
    reverse[index] = names[i];
    index++;
  }

  console.log("The reversed array", reverse);

  }
