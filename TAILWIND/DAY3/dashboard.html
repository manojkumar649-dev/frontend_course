<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex flex-col md:flex-row min-h-screen">

  
  <aside class="bg-blue-900 text-white w-full md:w-64 p-6">
    <h2 class="text-2xl font-bold mb-6">Admin Panel</h2>

    <ul class="space-y-4">
      <li><a href="#" class="block hover:text-blue-400">Dashboard</a></li>
      <li><a href="#" class="block hover:text-blue-400">Users</a></li>
      <li><a href="#" class="block hover:text-blue-400">Courses</a></li>
      <li><a href="#" class="block hover:text-blue-400">Reports</a></li>
      <li><a href="#" class="block hover:text-blue-400">Settings</a></li>
    </ul>
  </aside>

  
  <main class="flex-1 p-6">

    <h1 class="text-3xl font-bold mb-6">Dashboard</h1>

    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

      <div class="bg-white p-6 rounded-lg shadow  hover:scale-110">
        <h2 class="text-3xl font-bold">1200</h2>
        <p class="text-gray-500">Users</p>
      </div>

      <div class="bg-white p-6 rounded-lg shadow  hover:scale-110">
        <h2 class="text-3xl font-bold">85</h2>
        <p class="text-gray-500">Courses</p>
      </div>

      <div class="bg-white p-6 rounded-lg shadow  hover:scale-110">
        <h2 class="text-3xl font-bold">450</h2>
        <p class="text-gray-500">Enrollments</p>
      </div>

      <div class="bg-white p-6 rounded-lg shadow  hover:scale-110">
        <h2 class="text-3xl font-bold">₹50K</h2>
        <p class="text-gray-500">Revenue</p>
      </div>

    </div>


    <div class="bg-white rounded-lg shadow p-6 overflow-x-auto">

      <h2 class="text-xl font-bold mb-4">Recent Users</h2>

      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-blue-800 text-white">
            <th class="p-3 text-left">ID</th>
            <th class="p-3 text-left">Name</th>
            <th class="p-3 text-left">Email</th>
          </tr>
        </thead>

        <tbody>
          <tr class="border-b">
            <td class="p-3">1</td>
            <td class="p-3">Manoj</td>
            <td class="p-3">manoj@gmail.com</td>
          </tr>

          <tr class="border-b">
            <td class="p-3">2</td>
            <td class="p-3">Madhan</td>
            <td class="p-3">madhan@gmail.com</td>
          </tr>

          <tr>
            <td class="p-3">3</td>
            <td class="p-3">Leodass</td>
            <td class="p-3">leo@gmail.com</td>
          </tr>
        </tbody>
      </table>

    </div>

  </main>

</div>

</body>
</html>
