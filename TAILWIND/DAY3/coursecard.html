<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .course-card{
            transition:0.3s;
        }

        .course-card:hover{
            transform:translateY(-5px);
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
        }

        .course-card img{
            height:200px;
            object-fit:cover;
        }

       
        
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4"> Courses cards</h2>

    <div class="row g-4">

        
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100">
                <img src="../assets/image/javaimg.jpg" class="card-img-top" alt="Course">
              <div class="card-body">
                    <h5 class="card-title">Web Development</h5>
                    <p>Trainer: madhan kumar</p>
            <h6 class="text-success">₹21,999</h6>
                    <button class="btn btn-primary btn-enroll">Enroll Now</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100">
            <img src="../assets/image/pythonimg.jpg" class="card-img-top" alt="Course">
                <div class="card-body">
                    <h5 class="card-title">Python Programming</h5>
             <p>Trainer: David Leo</p>
                    <h6 class="text-success">₹20,499</h6>
                    <button class="btn btn-primary btn-enroll">Enroll Now</button>
                </div>
            </div>
        </div>

    
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100">
                <img src="../assets/image/uiuximg.jpg" class="card-img-top" alt="Course">
            <div class="card-body">
                    <h5 class="card-title">UI/UX Design</h5>
                    <p>Trainer: Sarah Khan</p>
                    <h6 class="text-success">₹19,499</h6>
                    <button class="btn btn-primary btn-enroll">Enroll Now</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <div class="card course-card h-100">
                <img src="../assets/image/digitalmarketing.jpg" class="card-img-top" alt="Course">
                <div class="card-body">
                  <h5 class="card-title">Digital Marketing</h5>
                <p>Trainer: sathish</p>
                    <h6 class="text-success">₹18,999</h6>
                    <button class="btn btn-primary btn-enroll">Enroll Now</button>
                </div>
            </div>
        </div>

    
      
    </div>
</div>

</body>
</html>
