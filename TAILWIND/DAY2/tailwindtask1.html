<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 ">
    
      <h1 class="font-bold">TASK 1</h1>
    <nav class="flex justify-between items-center bg-blue-300 text-white p-4">
        <div class="text-2xl font-bold">
            <img src="../assets/image/Fun Robot Logo.jpg" alt="Logo" class="h-8 inline-block ml-2">
            tailwindcss
        </div>

        <ul class="flex gap-6 ml-auto mr-6">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Services</a></li>
        </ul>

        <button class="bg-blue-500 px-4 py-2 rounded">
            Login
        </button>
    </nav>

    <div class="max-w-7xl mx-auto p-6">


       <h1 class="font-bold">TASK 2</h1>

        <div class="bg-white shadow-lg rounded-lg p-5 w-80 mb-10 ">
            <img
            src="../assets/image/ps4.jpg"
            alt="Product"
            class="w-full h-48 object-cover rounded-lg">

            <h3 class="text-xl font-bold mt-4">
                Card Title
            </h3>

            <p class="text-gray-600 mt-2">
                This is a simple card description using Tailwind CSS.
            </p>

            <button class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">
                Read More
            </button>
        </div>

      <h1 class="font-bold">TASK 3</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">

            <div class="bg-red-700 text-white p-8 rounded-xl shadow-lg text-center hover:scale-105 transition">
                Box 1
            </div>

            <div class="bg-blue-700 text-white p-8 rounded-xl shadow-lg text-center hover:scale-105 transition">
                Box 2
            </div>

            <div class="bg-green-700 text-white p-8 rounded-xl shadow-lg text-center hover:scale-105 transition">
                Box 3
            </div>

            <div class="bg-gray-500 text-white p-8 rounded-xl shadow-lg text-center hover:scale-105 transition">
                Box 4
            </div>

            <div class="bg-yellow-500 text-white p-8 rounded-xl shadow-lg text-center hover:scale-105 transition">
                Box 5
            </div>

            <div class="bg-red-500 text-white p-8 rounded-xl shadow-lg text-center hover:scale-105 transition">
                Box 6
            </div>

        </div>


      <h1 class="font-bold">TASK 4</h1>

        <div class="flex flex-col items-center bg-white shadow-lg rounded-lg p-6 w-72 mb-10">

            <!-- Profile Image -->
            <img
            src="../assets/image/profile.jpg"
            alt="Profile"
            class="rounded-full w-36 h-36 object-cover"
            >

            <h3 class="text-xl font-bold mt-4">
                MANOJKUMAR
            </h3>

            <p class="text-gray-500">
                FULL STACK DEVELOPER
            </p>

            <button class="mt-4 bg-blue-500 text-white px-5 py-2 rounded">
                FOLLOW
            </button>

        </div>

        <!-- Task 5: Image Gallery -->
        <h2 class="text-3xl font-bold mb-6">Task 5 - Image Gallery</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

        <div class="overflow-hidden rounded-lg">
            <img src="../assets/image/air1.jpg"
                class="w-full h-60 object-cover transition duration-300 hover:scale-110">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="../assets/image/ps4.jpg"
                class="w-full h-60 object-cover transition duration-300 hover:scale-110">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="../assets/image/air2.jpg"
                class="w-full h-60 object-cover transition duration-300 hover:scale-110">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="../assets/image/air3.jpg"
                class="w-full h-60 object-cover transition duration-300 hover:scale-110">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="../assets/image/air4.jpg"
                class="w-full h-60 object-cover transition duration-300 hover:scale-110">
        </div>

        <div class="overflow-hidden rounded-lg">
            <img src="../assets/image/ps2.jpg"
                class="w-full h-60 object-cover transition duration-300 hover:scale-110">
        </div>

        </div>

    </div>

</body>
</html>
