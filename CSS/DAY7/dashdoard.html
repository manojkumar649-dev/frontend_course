<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>
    <div class="thumbnail-card">
    <h3>Thumbnail</h3>

    <div class="content">
        <div class="image-box">
            <img src="../assets/image/sla.jpg" alt="Thumbnail">
        </div>

        <div class="details">
            <p>
                 <strong>Note:</strong>:This image tile will be used to
                represent this course across all your academy's landing pages.
            </p>

            <p>Allowed formats: .jpg, .png, .jpeg, .gif, .webp</p>
            <p>Preferred minimum resolution: 480 × 270</p>
            <p>Maximum size: 150kb</p>

            <div class="btn-group">
                <button class="change-btn">Change Image</button>
                <button class="remove-btn">Remove Image</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
